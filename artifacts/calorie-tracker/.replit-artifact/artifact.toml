kind = "mobile"
previewPath = "/"
title = "Calories Coach AI"
version = "1.0.0"
id = "artifacts/calorie-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21595

[services.development]
run = "pnpm --filter @workspace/calorie-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calorie-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/calorie-tracker", "run", "serve" ]

[services.env]
PORT = "21595"
BASE_PATH = "/"
